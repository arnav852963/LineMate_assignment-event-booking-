version: '3.8'
# the local mongo environment and mongo-express for testing and development purposes
services:
  mongodb:
    image: mongo:latest
    container_name: linemate_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: linemate_mongo_express
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: 'false'
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
